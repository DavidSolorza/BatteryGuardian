name: battery_guardian
description: Battery Guardian - Monitoreo inteligente de batería y salud del dispositivo.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  battery_plus: ^6.2.2
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  vibration: ^2.0.1
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  intl: ^0.20.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
